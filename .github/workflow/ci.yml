name: ci-cd rev

on:
   push:

jobs:
  docker:
    runs-on: Ubuntu-latest

    steps:
      - name: Check the actions
      - uses: actions/checkout@v4

      - name: login docker hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD}}
          docker login -u "sruthidoc07" --password--stdin
      
      - name: build image
        run: |
          docker build -t sruthidoc07/web:v1 .
      - name: push image
        run: |
          docker push sruthidoc07/web:v1
